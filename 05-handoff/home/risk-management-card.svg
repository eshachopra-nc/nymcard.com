<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="rmGauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="60%" stop-color="#22D3EE"></stop>
      <stop offset="100%" stop-color="#5B4FD9"></stop>
    </linearGradient>

    <radialGradient id="rmCenterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.16"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="rmCyanGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22D3EE" flood-opacity="0.55"></feDropShadow>
    </filter>

    <filter id="rmEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>
  </defs>

  <g>
    <circle cx="100" cy="25" r="3" fill="#22D3EE" fill-opacity="0.55">
      <animate attributeName="r" values="3;11;11" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
      <animate attributeName="fill-opacity" values="0.55;0;0" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
