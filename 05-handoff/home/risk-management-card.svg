  <g stroke="#22D3EE" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#rmCyanGlow)">
    <path d="M 60 96 L 60 80 L 76 80"></path>
    <path d="M 260 80 L 276 80 L 276 96"></path>
    <path d="M 60 264 L 60 280 L 76 280"></path>
    <path d="M 260 280 L 276 280 L 276 264"></path>
    <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <text x="168" y="316" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4A5578" letter-spacing="0.06em">Portfolio risk
    <tspan fill="#7A88AC"> · </tspan>
    <tspan fill="#22D3EE">within limits</tspan>
    <tspan fill="#7A88AC"> · updated 09:24</tspan>
  </text>
