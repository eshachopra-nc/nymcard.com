    <g transform="translate(168 180)">
      <g opacity="0" filter="url(#rmEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.85;1;1;0.97;0.85" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -180)">

          <circle cx="168" cy="180" r="110" fill="url(#rmCenterGlow)"></circle>

          <path d="M 104 244 A 90 90 0 1 1 232 244" stroke="#0E1A33" stroke-opacity="0.10" stroke-width="14" fill="none" stroke-linecap="round"></path>

          <path d="M 104 244 A 90 90 0 1 1 232 244" stroke="url(#rmGauge)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="424" stroke-dashoffset="424" filter="url(#rmCyanGlow)">
            <animate attributeName="stroke-dashoffset" values="424;424;55;55;424" keyTimes="0;0.05;0.2;0.929;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.16 1 0.3 1;0 0 1 1;0 0 1 1" repeatCount="indefinite"></animate>
          </path>

          <g stroke="#22D3EE" stroke-opacity="0.18" stroke-width="0.6" stroke-linecap="round">
            <line x1="92" y1="234" x2="96" y2="231"></line>
            <line x1="78" y1="200" x2="83" y2="198"></line>
            <line x1="78" y1="160" x2="83" y2="162"></line>
            <line x1="92" y1="126" x2="96" y2="129"></line>
            <line x1="138" y1="92" x2="140" y2="97"></line>
            <line x1="168" y1="84" x2="168" y2="89"></line>
            <line x1="198" y1="92" x2="196" y2="97"></line>
            <line x1="244" y1="126" x2="240" y2="129"></line>
            <line x1="258" y1="160" x2="253" y2="162"></line>
            <line x1="258" y1="200" x2="253" y2="198"></line>
            <line x1="244" y1="234" x2="240" y2="231"></line>
          </g>

          <text x="168" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#0E1A33" letter-spacing="-0.04em">87</text>
          <text x="168" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#7A88AC" letter-spacing="0.18em">/ 100</text>
          <text x="168" y="248" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">LOW RISK</text>

