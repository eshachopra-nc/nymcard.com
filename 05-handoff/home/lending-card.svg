<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <radialGradient id="ldDiskGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"></stop>
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="ldChipShadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0E1A33" flood-opacity="0.30"></feDropShadow>
    </filter>

    <filter id="ldCyanGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#22D3EE" flood-opacity="0.55"></feDropShadow>
    </filter>

    <filter id="ldEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>

    <clipPath id="ldDiskClip">
      <circle cx="168" cy="140" r="72"></circle>
    </clipPath>
  </defs>

  <g>
    <circle cx="92" cy="25" r="3" fill="#22D3EE" fill-opacity="0.55">
      <animate attributeName="r" values="3;11;11" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
      <animate attributeName="fill-opacity" values="0.55;0;0" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="92" cy="25" r="3" fill="#22D3EE"></circle>
    <text x="104" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0E1A33" letter-spacing="0.20em">DECISION · 92 MS</text>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 140)">
      <g opacity="0" filter="url(#ldEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.85;1;1;0.97;0.85" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -140)">

          <circle cx="168" cy="140" r="96" fill="url(#ldDiskGlow)"></circle>

          <circle cx="168" cy="140" r="72" fill="#1A2747" fill-opacity="0.94" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="1.4" filter="url(#ldChipShadow)"></circle>

          <text x="168" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">APPROVED</text>
          <text x="168" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">$4,200</text>

          <g opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.05;0.072;0.243;0.272;1" dur="7s" repeatCount="indefinite"></animate>

            <circle cx="168" cy="140" r="20" stroke="#22D3EE" stroke-width="1.6" fill="none">
              <animate attributeName="r" values="20;94" dur="1.8s" repeatCount="indefinite"></animate>
              <animate attributeName="opacity" values="0.95;0" dur="1.8s" repeatCount="indefinite"></animate>
              <animate attributeName="stroke-width" values="1.6;0.4" dur="1.8s" repeatCount="indefinite"></animate>
            </circle>
            <circle cx="168" cy="140" r="20" stroke="#22D3EE" stroke-width="1.6" fill="none">
              <animate attributeName="r" values="20;94" begin="0.6s" dur="1.8s" repeatCount="indefinite"></animate>
              <animate attributeName="opacity" values="0.95;0" begin="0.6s" dur="1.8s" repeatCount="indefinite"></animate>
              <animate attributeName="stroke-width" values="1.6;0.4" begin="0.6s" dur="1.8s" repeatCount="indefinite"></animate>
            </circle>
            <circle cx="168" cy="140" r="20" stroke="#22D3EE" stroke-width="1.6" fill="none">
              <animate attributeName="r" values="20;94" begin="1.2s" dur="1.8s" repeatCount="indefinite"></animate>
              <animate attributeName="opacity" values="0.95;0" begin="1.2s" dur="1.8s" repeatCount="indefinite"></animate>
              <animate attributeName="stroke-width" values="1.6;0.4" begin="1.2s" dur="1.8s" repeatCount="indefinite"></animate>
            </circle>
          </g>

        </g>
      </g>
    </g>
  </g>

  <g stroke="#22D3EE" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#ldCyanGlow)">
    <path d="M 84 72 L 84 56 L 100 56"></path>
    <path d="M 236 56 L 252 56 L 252 72"></path>
    <path d="M 84 208 L 84 224 L 100 224"></path>
    <path d="M 236 224 L 252 224 L 252 208"></path>
    <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <g transform="translate(168 258)">
    <g filter="url(#ldChipShadow)">
      <circle cx="-42" cy="0" r="8" fill="#22D3EE"></circle>
      <path d="M -46 0 L -43 3.5 L -37 -4" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
    </g>
    <circle cx="-14" cy="0" r="7" stroke="#7A88AC" stroke-width="1.4" fill="none"></circle>
    <circle cx="14" cy="0" r="7" stroke="#7A88AC" stroke-width="1.4" fill="none"></circle>
    <circle cx="42" cy="0" r="7" stroke="#7A88AC" stroke-width="1.4" fill="none"></circle>

    <line x1="-30" y1="0" x2="-21" y2="0" stroke="#7A88AC" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 2"></line>
    <line x1="-2" y1="0" x2="7" y2="0" stroke="#7A88AC" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 2"></line>
    <line x1="26" y1="0" x2="35" y2="0" stroke="#7A88AC" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 2"></line>
  </g>

  <text x="168" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4A5578" letter-spacing="0.04em">$1,050 / mo
    <tspan fill="#7A88AC"> · </tspan>
    <tspan fill="#7A88AC">4 monthly instalments</tspan>
  </text>

  <text x="168" y="328" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#22D3EE" letter-spacing="0.18em" opacity="0.85">0.0% APR · BNPL</text>
</svg>
