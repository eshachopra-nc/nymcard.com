<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="vcCardBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="32%" stop-color="#5B4FD9"></stop>
      <stop offset="68%" stop-color="#304DBB"></stop>
      <stop offset="100%" stop-color="#1F3389"></stop>
    </linearGradient>

    <linearGradient id="vcSheen2" x1="0" x2="1" y1="0" y2="0" spreadMethod="repeat">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.75"></stop>
      <stop offset="75%" stop-color="#22D3EE" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <animate attributeName="x1" values="0;1" dur="11s" repeatCount="indefinite"></animate>
      <animate attributeName="x2" values="1;2" dur="11s" repeatCount="indefinite"></animate>
    </linearGradient>
    <linearGradient id="vcSheen3" x1="0" x2="1" y1="0" y2="0" spreadMethod="repeat">
      <stop offset="0%" stop-color="#5B4FD9" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#A78CFF" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#5B4FD9" stop-opacity="0"></stop>
      <animate attributeName="x1" values="0;1" dur="15s" repeatCount="indefinite"></animate>
      <animate attributeName="x2" values="1;2" dur="15s" repeatCount="indefinite"></animate>
    </linearGradient>

    <linearGradient id="vcChipBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"></stop>
      <stop offset="100%" stop-color="#CBD5E1"></stop>
    </linearGradient>

    <linearGradient id="vcTopHighlight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="vcBlurM" x="-8%" y="-8%" width="116%" height="116%"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter>
    <filter id="vcBlurS" x="-4%" y="-4%" width="108%" height="108%"><feGaussianBlur stdDeviation="1"></feGaussianBlur></filter>

    <filter id="vcEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>

    <clipPath id="vcCardClip">
      <rect x="52" y="8" width="232" height="344" rx="20"></rect>
    </clipPath>
  </defs>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 180)">
      <g opacity="0" filter="url(#vcEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.85;1;1;0.97;0.85" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -180)">

          <rect x="52" y="8" width="232" height="344" rx="20" fill="url(#vcCardBg)"></rect>

          <g clip-path="url(#vcCardClip)">
            <g class="sheen-b" filter="url(#vcBlurM)" opacity="0.75">
              <path d="M -60 310 C 60 260, 160 240, 240 220 S 360 190, 500 180" fill="none" stroke="url(#vcSheen2)" stroke-width="52" stroke-linecap="round"></path>
            </g>
            <g class="sheen-c" filter="url(#vcBlurM)" opacity="0.6">
              <path d="M -60 240 C 60 200, 160 180, 240 170 S 360 160, 500 150" fill="none" stroke="url(#vcSheen3)" stroke-width="36" stroke-linecap="round"></path>
            </g>

            <g class="sheen-fine" fill="none" stroke="#FFFFFF" stroke-linecap="round" filter="url(#vcBlurS)">
              <animateTransform attributeName="transform" type="translate" values="0 0;-30 -4;0 0;30 4;0 0" keyTimes="0;0.25;0.5;0.75;1" dur="18s" repeatCount="indefinite"></animateTransform>
              <path d="M -60 258 C 60 210, 160 190, 240 172 S 360 152, 500 142" stroke-width="1.5" stroke-opacity="0.88"></path>
              <path d="M -60 282 C 60 234, 160 214, 240 196 S 360 176, 500 168" stroke-width="1" stroke-opacity="0.62"></path>
              <path d="M -60 302 C 60 256, 160 236, 240 218 S 360 200, 500 196" stroke-width="0.8" stroke-opacity="0.48"></path>
            </g>

            <path d="M 64 10 H 272" stroke="url(#vcTopHighlight)" stroke-width="1" fill="none"></path>
          </g>

          <g transform="translate(72 90)">
            <rect width="46" height="34" rx="6" fill="url(#vcChipBase)"></rect>
            <rect width="46" height="34" rx="6" fill="#FFFFFF" fill-opacity="0.18"></rect>
            <g fill="none" stroke="#64748B" stroke-width="0.7" stroke-linecap="round" stroke-opacity="0.85">
              <rect x="3" y="3" width="40" height="28" rx="2.5"></rect>
              <line x1="3" y1="17" x2="43" y2="17"></line>
              <line x1="15" y1="3" x2="15" y2="14"></line>
              <line x1="31" y1="3" x2="31" y2="14"></line>
              <line x1="15" y1="20" x2="15" y2="31"></line>
              <line x1="31" y1="20" x2="31" y2="31"></line>
              <rect x="16" y="12" width="14" height="10" fill="#64748B" fill-opacity="0.22"></rect>
              <line x1="3" y1="14" x2="16" y2="14"></line>
              <line x1="30" y1="14" x2="43" y2="14"></line>
              <line x1="3" y1="20" x2="16" y2="20"></line>
              <line x1="30" y1="20" x2="43" y2="20"></line>
            </g>
          </g>

          <g transform="translate(248 38)" fill="none" stroke="#FFFFFF" stroke-linecap="round">
            <path d="M 0 -10 A 14 14 0 0 1 0 10" stroke-width="2"></path>
            <path d="M -4 -7 A 9 9 0 0 1 -4 7" stroke-width="1.8" stroke-opacity="0.78"></path>
            <path d="M -8 -3 A 4 4 0 0 1 -8 3" stroke-width="1.6" stroke-opacity="0.52"></path>
          </g>

          <text x="168" y="244" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="14" font-weight="500" fill="#FFFFFF" fill-opacity="0.80" letter-spacing="0.20em">•••• •••• •••• ••••</text>

          <g transform="translate(72 280)" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-linecap="round">
            <line x1="0" y1="0" x2="22" y2="0" stroke-width="1"></line>
            <line x1="0" y1="6" x2="34" y2="6" stroke-width="0.8" stroke-opacity="0.32"></line>
          </g>

          <g transform="translate(228 286)" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="14,0 24,6 24,18 14,24 4,18 4,6" stroke-width="1.3"></polygon>
            <polygon points="14,7 20,10 20,14 14,17 8,14 8,10" stroke-width="0.7" stroke-opacity="0.50"></polygon>
            <circle cx="14" cy="12" r="1.5" fill="#FFFFFF" fill-opacity="0.70" stroke="none"></circle>
          </g>

        </g>
      </g>
    </g>
  </g>
</svg>
