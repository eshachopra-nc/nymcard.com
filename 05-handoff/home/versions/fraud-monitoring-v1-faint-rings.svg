    <circle cx="80" cy="25" r="3" fill="#5B4FD9"></circle>
    <text x="92" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0E1A33" letter-spacing="0.20em">FRAUD MONITORING · LIVE</text>
  </g>

  <g>
