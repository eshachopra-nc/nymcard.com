            <circle cx="168" cy="180" r="72" stroke-opacity="0.38" stroke-width="0.8"></circle>
            <circle cx="168" cy="180" r="104" stroke-opacity="0.50" stroke-width="1"></circle>
          </g>

          <g stroke="#22D3EE" stroke-opacity="0.18" stroke-width="0.6">
            <line x1="60" y1="180" x2="276" y2="180"></line>
            <line x1="168" y1="72" x2="168" y2="288"></line>
            <line x1="92" y1="104" x2="244" y2="256"></line>
