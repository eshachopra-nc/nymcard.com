            <path d="M 168 180 L 168 76 A 104 104 0 0 0 101 100 Z" fill="#22D3EE" fill-opacity="0.28"></path>
            <path d="M 168 180 L 168 76 A 104 104 0 0 0 132 82 Z" fill="#22D3EE" fill-opacity="0.45"></path>

            <line x1="168" y1="180" x2="168" y2="72" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" filter="url(#fmCyanGlow)"></line>

            <circle cx="168" cy="72" r="4" fill="#FFFFFF" filter="url(#fmCyanGlow)"></circle>
          </g>

          <circle cx="168" cy="180" r="6" fill="#22D3EE" filter="url(#fmCyanGlow)"></circle>
          <circle cx="168" cy="180" r="2.5" fill="#FFFFFF"></circle>

          <g>
            <circle cx="218" cy="138" r="8" fill="#5B4FD9" fill-opacity="0.4" filter="url(#fmPingGlow)">
