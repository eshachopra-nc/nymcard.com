<svg width="580" height="740" viewBox="0 0 580 740" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>nCore layered infrastructure</title>
  <desc>Oblique 3D stack: one bright nCore plane floating above nine labeled product layers, lit by a brand-blue glow on the right of the stack.</desc>

  <defs>
    <filter id="bigBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="56"/></filter>
    <filter id="medBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="ds" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#1B2A66" flood-opacity="0.18"/>
    </filter>

    <linearGradient id="gTop" x1="92" y1="120" x2="450" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8ECF8"/>
    </linearGradient>
    <linearGradient id="gFront" x1="92" y1="0" x2="380" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFCFE"/>
      <stop offset="1" stop-color="#DDE3F4"/>
    </linearGradient>
    <linearGradient id="gRight" x1="380" y1="0" x2="430" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C90E4"/>
      <stop offset="1" stop-color="#B6C3F1"/>
    </linearGradient>
    <linearGradient id="gnTop" x1="70" y1="34" x2="452" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF1FB"/>
    </linearGradient>
    <linearGradient id="gnFront" x1="70" y1="0" x2="402" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E5EAF7"/>
    </linearGradient>
    <linearGradient id="gnRight" x1="402" y1="0" x2="452" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8DA0E9"/>
      <stop offset="1" stop-color="#C6D0F4"/>
    </linearGradient>

    <style>
      .s-top{fill:url(#gTop);stroke:#FFFFFF;stroke-width:1;stroke-linejoin:round}
      .s-front{fill:url(#gFront);stroke:#AEB9DC;stroke-opacity:.8;stroke-width:1;stroke-linejoin:round}
      .s-right{fill:url(#gRight);stroke:#6E83E0;stroke-opacity:.55;stroke-width:1;stroke-linejoin:round}
      .n-top{fill:url(#gnTop);stroke:#FFFFFF;stroke-width:1.2;stroke-linejoin:round}
      .n-front{fill:url(#gnFront);stroke:#AEB9DC;stroke-opacity:.85;stroke-width:1;stroke-linejoin:round}
      .n-right{fill:url(#gnRight);stroke:#6E83E0;stroke-opacity:.6;stroke-width:1;stroke-linejoin:round}
      .label{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:620;fill:#16224A}
      .ncore{font-family:Inter,Arial,sans-serif;font-size:42px;font-weight:760;fill:#16224A;letter-spacing:-1.4px}
      .gly{fill:none;stroke:#304DBB;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
      .rglow{animation:glowPulse 5s ease-in-out infinite}
      @keyframes glowPulse{0%,100%{opacity:.5}50%{opacity:.9}}
      @media (prefers-reduced-motion:reduce){.rglow{animation:none;opacity:.7}}
    </style>
  </defs>

  <!-- ambient field -->
  <ellipse cx="290" cy="420" rx="300" ry="330" fill="#304DBB" fill-opacity="0.11" filter="url(#bigBlur)"/>

  <!-- brand-blue glow behind the right of the stack -->
  <ellipse class="rglow" cx="455" cy="466" rx="168" ry="300" fill="#304DBB" fill-opacity="0.5" filter="url(#bigBlur)"/>
  <ellipse class="rglow" cx="440" cy="466" rx="94" ry="236" fill="#5E78DD" fill-opacity="0.6" filter="url(#medBlur)"/>
  <ellipse class="rglow" cx="432" cy="458" rx="46" ry="158" fill="#C6D0F6" fill-opacity="0.82" filter="url(#medBlur)"/>

  <g filter="url(#ds)">
    <!-- layer 9 — Reconciliation -->
    <g>
      <path class="s-top" d="M92 664 L380 664 L430 618 L142 618 Z"/>
      <path class="s-right" d="M380 664 L430 618 L430 664 L380 710 Z"/>
      <path class="s-front" d="M92 664 L380 664 L380 710 L92 710 Z"/>
      <g transform="translate(106 675)">
        <path class="gly" d="M5.5 5.8 l5.2 6.2 -5.2 6.2 M18.5 5.8 l-5.2 6.2 5.2 6.2"/>
        <text class="label" x="40" y="17">Reconciliation</text>
      </g>
    </g>
    <!-- layer 8 — Settlement -->
    <g>
      <path class="s-top" d="M92 608 L380 608 L430 562 L142 562 Z"/>
      <path class="s-right" d="M380 608 L430 562 L430 608 L380 654 Z"/>
      <path class="s-front" d="M92 608 L380 608 L380 654 L92 654 Z"/>
      <g transform="translate(106 619)">
        <path class="gly" d="M7 19.5 V13 M12 19.5 V6 M17 19.5 V10"/>
        <text class="label" x="40" y="17">Settlement</text>
      </g>
    </g>
    <!-- layer 7 — 3D Secure -->
    <g>
      <path class="s-top" d="M92 552 L380 552 L430 506 L142 506 Z"/>
      <path class="s-right" d="M380 552 L430 506 L430 552 L380 598 Z"/>
      <path class="s-front" d="M92 552 L380 552 L380 598 L92 598 Z"/>
      <g transform="translate(106 563)">
        <rect class="gly" x="5" y="10.8" width="14" height="9.6" rx="2"/>
        <path class="gly" d="M8 10.8 V7.4 a4 4 0 0 1 8 0 v3.4"/>
        <text class="label" x="40" y="17">3D Secure</text>
      </g>
    </g>
    <!-- layer 6 — Risk -->
    <g>
      <path class="s-top" d="M92 496 L380 496 L430 450 L142 450 Z"/>
      <path class="s-right" d="M380 496 L430 450 L430 496 L380 542 Z"/>
      <path class="s-front" d="M92 496 L380 496 L380 542 L92 542 Z"/>
      <g transform="translate(106 507)">
        <path class="gly" d="M12 4 l9.2 15.8 H2.8 z"/>
        <path class="gly" d="M12 10 v4.6 M12 17.8 v.2"/>
        <text class="label" x="40" y="17">Risk</text>
      </g>
    </g>
    <!-- layer 5 — Fraud -->
    <g>
      <path class="s-top" d="M92 440 L380 440 L430 394 L142 394 Z"/>
      <path class="s-right" d="M380 440 L430 394 L430 440 L380 486 Z"/>
      <path class="s-front" d="M92 440 L380 440 L380 486 L92 486 Z"/>
      <g transform="translate(106 451)">
        <path class="gly" d="M12 3.6 l8 2.8 v5.4 c0 5.1 -3.5 9 -8 10.6 c-4.5 -1.6 -8 -5.5 -8 -10.6 V6.4 z"/>
        <text class="label" x="40" y="17">Fraud</text>
      </g>
    </g>
    <!-- layer 4 — Identity -->
    <g>
      <path class="s-top" d="M92 384 L380 384 L430 338 L142 338 Z"/>
      <path class="s-right" d="M380 384 L430 338 L430 384 L380 430 Z"/>
      <path class="s-front" d="M92 384 L380 384 L380 430 L92 430 Z"/>
      <g transform="translate(106 395)">
        <circle class="gly" cx="12" cy="9" r="3.6"/>
        <path class="gly" d="M5.2 19 a6.9 6.9 0 0 1 13.6 0"/>
        <text class="label" x="40" y="17">Identity</text>
      </g>
    </g>
    <!-- layer 3 — Cross-Border & FX -->
    <g>
      <path class="s-top" d="M92 328 L380 328 L430 282 L142 282 Z"/>
      <path class="s-right" d="M380 328 L430 282 L430 328 L380 374 Z"/>
      <path class="s-front" d="M92 328 L380 328 L380 374 L92 374 Z"/>
      <g transform="translate(106 339)">
        <path class="gly" d="M4 9.2 H17 M14 6.2 l3 3 -3 3"/>
        <path class="gly" d="M20 14.8 H7 M10 11.8 l-3 3 3 3"/>
        <text class="label" x="40" y="17">Cross-Border &amp; FX</text>
      </g>
    </g>
    <!-- layer 2 — Lending -->
    <g>
      <path class="s-top" d="M92 272 L380 272 L430 226 L142 226 Z"/>
      <path class="s-right" d="M380 272 L430 226 L430 272 L380 318 Z"/>
      <path class="s-front" d="M92 272 L380 272 L380 318 L92 318 Z"/>
      <g transform="translate(106 283)">
        <circle class="gly" cx="12" cy="12" r="7.6"/>
        <path class="gly" d="M12 7.2 V16.8 M9.4 9.6 H14.2"/>
        <text class="label" x="40" y="17">Lending</text>
      </g>
    </g>
    <!-- layer 1 — Cards -->
    <g>
      <path class="s-top" d="M92 216 L380 216 L430 170 L142 170 Z"/>
      <path class="s-right" d="M380 216 L430 170 L430 216 L380 262 Z"/>
      <path class="s-front" d="M92 216 L380 216 L380 262 L92 262 Z"/>
      <g transform="translate(106 227)">
        <rect class="gly" x="3" y="6.5" width="18" height="12.5" rx="2.4"/>
        <path class="gly" d="M3 11.5 H21"/>
        <text class="label" x="40" y="17">Cards</text>
      </g>
    </g>

    <!-- nCore plane -->
    <g>
      <path class="n-right" d="M402 80 L452 34 L452 84 L402 130 Z"/>
      <path class="n-front" d="M70 80 L402 80 L402 130 L70 130 Z"/>
      <path class="n-top" d="M70 80 L402 80 L452 34 L120 34 Z"/>
      <text class="ncore" x="258" y="70" text-anchor="middle">nCore</text>
    </g>
  </g>

  <!-- brand-blue glow accent in front of the right edge -->
  <ellipse class="rglow" cx="446" cy="466" rx="56" ry="222" fill="#4E68D4" fill-opacity="0.38" filter="url(#medBlur)"/>
</svg>
