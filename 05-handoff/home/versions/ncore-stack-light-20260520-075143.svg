<svg width="900" height="900" viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>nCore AI-native layered stack (light mode)</title>
  <desc>nCore foundation with five unlabeled platform layers and a slow flowing cyan glow on each outer rail representing AI moving through every layer.</desc>

  <defs>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="railBlur" x="-300%" y="-10%" width="700%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="ambientBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <linearGradient id="edge" x1="180" y1="80" x2="720" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1A33" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#4A5578" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0E1A33" stop-opacity="0.55"/>
    </linearGradient>

    <linearGradient id="nCoreFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B4FD9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.10"/>
    </linearGradient>

    <linearGradient id="nCoreSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="ambient" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="0.55" stop-color="#5B4FD9" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <style>
      .rail-flow {
        stroke-dasharray: 55 600;
        animation: flow 7s linear infinite;
      }
      .rail-flow.delayed {
        animation-delay: -3.5s;
      }
      @keyframes flow {
        0% { stroke-dashoffset: 55; }
        100% { stroke-dashoffset: -655; }
      }
    </style>
  </defs>

  <ellipse cx="450" cy="450" rx="390" ry="440" fill="url(#ambient)" filter="url(#ambientBlur)"/>

  <g>
    <line x1="180" y1="220" x2="180" y2="820" stroke="#22D3EE" stroke-opacity="0.20" stroke-width="2" filter="url(#softGlow)"/>
    <line class="rail-flow" x1="180" y1="220" x2="180" y2="820" stroke="#22D3EE" stroke-opacity="0.95" stroke-width="4" stroke-linecap="round" filter="url(#railBlur)"/>
  </g>

  <g>
    <line x1="720" y1="220" x2="720" y2="820" stroke="#22D3EE" stroke-opacity="0.20" stroke-width="2" filter="url(#softGlow)"/>
    <line class="rail-flow delayed" x1="720" y1="220" x2="720" y2="820" stroke="#22D3EE" stroke-opacity="0.95" stroke-width="4" stroke-linecap="round" filter="url(#railBlur)"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M450 70 L735 220 L450 370 L165 220 Z" fill="url(#nCoreFill)" stroke="url(#edge)" stroke-width="1.6"/>
    <path d="M165 220V258C165 265 170 271 177 275L438 413C446 417 454 417 462 413L723 275C730 271 735 265 735 258V220"
          fill="#F4F6FF" fill-opacity="0.45" stroke="url(#edge)" stroke-width="1.2"/>
    <path d="M165 220 L450 370 L735 220" stroke="#22D3EE" stroke-opacity="0.50" stroke-width="2"/>
    <path d="M450 70 L735 220 L450 370 L165 220 Z" fill="url(#nCoreSheen)"/>
    <text x="450" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="700" fill="#0E1A33" letter-spacing="-2">nCore</text>
  </g>

  <g>
    <g transform="translate(0 0)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#F4F6FF" fill-opacity="0.50" stroke="url(#edge)" stroke-width="1.15"/>
    </g>
    <g transform="translate(0 68)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#F4F6FF" fill-opacity="0.45" stroke="url(#edge)" stroke-width="1.15"/>
    </g>
    <g transform="translate(0 136)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#F4F6FF" fill-opacity="0.40" stroke="url(#edge)" stroke-width="1.15"/>
    </g>
    <g transform="translate(0 204)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#F4F6FF" fill-opacity="0.35" stroke="url(#edge)" stroke-width="1.15"/>
    </g>
    <g transform="translate(0 272)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#F4F6FF" fill-opacity="0.30" stroke="url(#edge)" stroke-width="1.15"/>
    </g>
  </g>
</svg>
