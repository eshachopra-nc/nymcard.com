<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <radialGradient id="rcLensGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.85"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.40"></stop>
    </radialGradient>

    <filter id="rcCyanGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22D3EE" flood-opacity="0.70"></feDropShadow>
    </filter>

    <filter id="rcVioletGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#5B4FD9" flood-opacity="0.70"></feDropShadow>
    </filter>

    <filter id="rcEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>
  </defs>

  <g>
    <circle cx="100" cy="25" r="3" fill="#22D3EE" fill-opacity="0.55">
      <animate attributeName="r" values="3;11;11" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
      <animate attributeName="fill-opacity" values="0.55;0;0" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="100" cy="25" r="3" fill="#22D3EE"></circle>
    <text x="112" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0E1A33" letter-spacing="0.20em">MATCHING · LIVE</text>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 190)">
      <g opacity="0" filter="url(#rcEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.86;1;1;0.97;0.86" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -190)">

          <text x="122" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0E1A33" letter-spacing="0.20em">CARD</text>
          <text x="214" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0E1A33" letter-spacing="0.20em">BANK</text>

          <circle cx="122" cy="190" r="85" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-opacity="0.85" stroke-width="2.4" filter="url(#rcCyanGlow)"></circle>
          <circle cx="214" cy="190" r="85" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-opacity="0.85" stroke-width="2.4" filter="url(#rcCyanGlow)"></circle>

          <path d="M 168 119 A 85 85 0 0 1 168 261 A 85 85 0 0 1 168 119 Z" fill="url(#rcLensGlow)" stroke="#FFFFFF" stroke-width="1.4" stroke-opacity="0.85" filter="url(#rcCyanGlow)">
            <animate attributeName="fill-opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite"></animate>
          </path>

          <text x="168" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">98.4%</text>
          <text x="168" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="0.22em">MATCHED</text>

          <g transform="translate(50 274)" filter="url(#rcVioletGlow)">
            <rect x="-32" y="-13" width="64" height="26" rx="13" fill="#5B4FD9">
              <animate attributeName="fill-opacity" values="0.85;1;0.85" dur="1.6s" repeatCount="indefinite"></animate>
            </rect>
            <text x="0" y="4" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="0.04em">Δ 1</text>
          </g>

        </g>
      </g>
    </g>
  </g>

  <g stroke="#22D3EE" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#rcCyanGlow)">
    <path d="M 20 92 L 20 76 L 36 76"></path>
    <path d="M 300 76 L 316 76 L 316 92"></path>
    <path d="M 20 280 L 20 296 L 36 296"></path>
    <path d="M 300 296 L 316 296 L 316 280"></path>
    <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <text x="168" y="324" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4A5578" letter-spacing="0.06em">12,432 reconciled today
    <tspan fill="#7A88AC"> · </tspan>
    <tspan fill="#A78CFF">1 review</tspan>
  </text>
</svg>
