<svg width="660" height="880" viewBox="0 0 660 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>nCore layered infrastructure (dark)</title>
  <desc>Dark-mode isometric stack: one nCore glass plane floating above nine labeled product layers, with a cyan glow on the right side of the stack.</desc>

  <defs>
    <filter id="bigBlur"><feGaussianBlur stdDeviation="52"/></filter>
    <filter id="medBlur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="stackShadow" x="-25%" y="-15%" width="150%" height="135%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <style>
      .lyr-top{fill:#FFFFFF;fill-opacity:.07;stroke:#FFFFFF;stroke-opacity:.26;stroke-width:1;stroke-linejoin:round}
      .lyr-front{fill:#FFFFFF;fill-opacity:.04;stroke:#FFFFFF;stroke-opacity:.20;stroke-width:1;stroke-linejoin:round}
      .lyr-right{fill:#22D3EE;fill-opacity:.30;stroke:#22D3EE;stroke-opacity:.6;stroke-width:1;stroke-linejoin:round}
      .ncore-top{fill:#FFFFFF;fill-opacity:.12;stroke:#FFFFFF;stroke-opacity:.34;stroke-width:1.2;stroke-linejoin:round}
      .ncore-front{fill:#FFFFFF;fill-opacity:.06;stroke:#FFFFFF;stroke-opacity:.24;stroke-width:1;stroke-linejoin:round}
      .ncore-right{fill:#22D3EE;fill-opacity:.34;stroke:#22D3EE;stroke-opacity:.62;stroke-width:1;stroke-linejoin:round}
      .label{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:640;fill:#F4F8FF}
      .ncore{font-family:Inter,Arial,sans-serif;font-size:42px;font-weight:760;fill:#F8FBFF;letter-spacing:-1.4px}
      .ico{fill:#FFFFFF;fill-opacity:.06;stroke:#FFFFFF;stroke-opacity:.3;stroke-width:1}
      .gly{fill:none;stroke:#DCEAF5;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
      .rglow{animation:glowPulse 4.6s ease-in-out infinite}
      @keyframes glowPulse{0%,100%{opacity:.55}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){.rglow{animation:none;opacity:.78}}
    </style>
  </defs>

  <!-- ambient field — primary-blue led -->
  <ellipse cx="330" cy="450" rx="320" ry="360" fill="#304DBB" fill-opacity="0.30" filter="url(#bigBlur)"/>

  <!-- cyan glow on the right of the stack -->
  <ellipse class="rglow" cx="512" cy="470" rx="150" ry="300" fill="#22D3EE" filter="url(#bigBlur)"/>
  <ellipse class="rglow" cx="486" cy="470" rx="74" ry="240" fill="#22D3EE" filter="url(#medBlur)"/>

  <g filter="url(#stackShadow)">
    <!-- nCore plane -->
    <path class="ncore-front" d="M44 224 L474 152 L474 166 L44 238 Z"/>
    <path class="ncore-right" d="M474 152 L568 6 L568 20 L474 166 Z"/>
    <path class="ncore-top" d="M44 224 L474 152 L568 6 L138 78 Z"/>
    <text class="ncore" x="300" y="118" text-anchor="middle" transform="rotate(-9.46 300 118)">nCore</text>

    <!-- nine product layers -->
    <g transform="translate(0 0)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <rect class="gly" x="5" y="-9" width="12" height="9" rx="1.6"/><path class="gly" d="M5 -5.5 h12"/>
        <text class="label" x="32" y="-0.5">Cards</text>
      </g>
    </g>
    <g transform="translate(0 60)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <circle class="gly" cx="11" cy="-5" r="5.4"/><path class="gly" d="M11 -9 v8 M8.5 -7.4 h4"/>
        <text class="label" x="32" y="-0.5">Lending</text>
      </g>
    </g>
    <g transform="translate(0 120)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <path class="gly" d="M4 -8.5 h11 M12 -11.5 l3 3 -3 3"/><path class="gly" d="M18 -1.5 h-11 M10 -4.5 l-3 3 3 3"/>
        <text class="label" x="32" y="-0.5">Cross-Border &amp; FX</text>
      </g>
    </g>
    <g transform="translate(0 180)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <circle class="gly" cx="11" cy="-9.5" r="3"/><path class="gly" d="M5 1 a6.6 6.6 0 0 1 12 0"/>
        <text class="label" x="32" y="-0.5">Identity</text>
      </g>
    </g>
    <g transform="translate(0 240)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <path class="gly" d="M11 -12.5 l6.4 2.1 v4.7 c0 4.2 -3 7.4 -6.4 8.6 c-3.4 -1.2 -6.4 -4.4 -6.4 -8.6 v-4.7 z"/>
        <text class="label" x="32" y="-0.5">Fraud</text>
      </g>
    </g>
    <g transform="translate(0 300)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <path class="gly" d="M11 -12.5 l7.4 13.6 h-14.8 z"/><path class="gly" d="M11 -6 v3.4 M11 0.6 v.2"/>
        <text class="label" x="32" y="-0.5">Risk</text>
      </g>
    </g>
    <g transform="translate(0 360)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <rect class="gly" x="5.4" y="-6" width="11.2" height="7.6" rx="1.7"/><path class="gly" d="M7.8 -6 v-2.5 a3.2 3.2 0 0 1 6.4 0 v2.5"/>
        <text class="label" x="32" y="-0.5">3D Secure</text>
      </g>
    </g>
    <g transform="translate(0 420)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <path class="gly" d="M5.6 0.6 v-4.6 M11 0.6 v-9.6 M16.4 0.6 v-7"/>
        <text class="label" x="32" y="-0.5">Settlement</text>
      </g>
    </g>
    <g transform="translate(0 480)">
      <path class="lyr-front" d="M72 360 L420 302 L420 313 L72 371 Z"/>
      <path class="lyr-right" d="M420 302 L496 184 L496 195 L420 313 Z"/>
      <path class="lyr-top" d="M72 360 L420 302 L496 184 L148 242 Z"/>
      <g transform="translate(104 250) rotate(-9.46)">
        <rect class="ico" x="0" y="-16" width="22" height="22" rx="6"/>
        <path class="gly" d="M5 -8.5 l4.6 4 -4.6 4 M17 -8.5 l-4.6 4 4.6 4"/>
        <text class="label" x="32" y="-0.5">Reconciliation</text>
      </g>
    </g>
  </g>

  <!-- right-edge glow accent, in front -->
  <ellipse class="rglow" cx="500" cy="470" rx="60" ry="250" fill="#22D3EE" fill-opacity="0.55" filter="url(#medBlur)"/>
</svg>
