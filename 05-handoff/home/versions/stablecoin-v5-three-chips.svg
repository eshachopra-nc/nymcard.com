<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="ssFiatFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1A33"></stop>
      <stop offset="100%" stop-color="#1F2C4D"></stop>
    </linearGradient>

    <linearGradient id="ssBridgeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2C4D"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.25"></stop>
    </linearGradient>

    <filter id="ssChipShadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0E1A33" flood-opacity="0.35"></feDropShadow>
    </filter>

    <filter id="ssCyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22D3EE" flood-opacity="0.65"></feDropShadow>
    </filter>

    <filter id="ssEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>
  </defs>

  <g>
    <circle cx="100" cy="25" r="3" fill="#22D3EE" fill-opacity="0.55">
      <animate attributeName="r" values="3;11;11" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
      <animate attributeName="fill-opacity" values="0.55;0;0" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="100" cy="25" r="3" fill="#22D3EE"></circle>
    <text x="112" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0E1A33" letter-spacing="0.20em">INSTANT · SETTLEMENT</text>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 180)">
      <g opacity="0" filter="url(#ssEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.86;1;1;0.97;0.86" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -180)">

          <text x="118" y="146" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">ON-RAMP</text>
          <text x="218" y="146" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">OFF-RAMP</text>

          <g filter="url(#ssChipShadow)">
            <rect x="18" y="162" width="80" height="56" rx="14" fill="url(#ssFiatFill)" stroke="#22D3EE" stroke-opacity="0.40" stroke-width="1"></rect>
            <text x="58" y="194" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22D3EE">$</text>
            <text x="58" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.10em">USD</text>
          </g>

          <g transform="translate(118 190)">
            <line x1="-12" y1="0" x2="12" y2="0" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85"></line>
            <path d="M 6 -5 L 12 0 L 6 5" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95" filter="url(#ssCyanGlow)"></path>
          </g>

          <g filter="url(#ssChipShadow)">
            <rect x="130" y="156" width="76" height="68" rx="14" fill="url(#ssBridgeFill)" stroke="#22D3EE" stroke-opacity="0.90" stroke-width="1.6" filter="url(#ssCyanGlow)">
              <animate attributeName="stroke-opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite"></animate>
            </rect>
            <text x="168" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">STABLECOIN RAIL</text>
            <circle cx="156" cy="194" r="7" fill="#22D3EE"></circle>
            <circle cx="156" cy="194" r="3" fill="#FFFFFF"></circle>
            <text x="184" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">USDC</text>
            <text x="168" y="216" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="7" fill="#A8B5D9">$50,000</text>
          </g>

          <g transform="translate(218 190)">
            <line x1="-12" y1="0" x2="12" y2="0" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85"></line>
            <path d="M 6 -5 L 12 0 L 6 5" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95" filter="url(#ssCyanGlow)"></path>
          </g>

          <g filter="url(#ssChipShadow)">
            <rect x="238" y="162" width="80" height="56" rx="14" fill="url(#ssFiatFill)" stroke="#22D3EE" stroke-opacity="0.40" stroke-width="1"></rect>
            <text x="278" y="194" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22D3EE">$</text>
            <text x="278" y="210" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.10em">USD</text>
          </g>

        </g>
      </g>
    </g>
  </g>

  <g stroke="#22D3EE" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#ssCyanGlow)">
    <path d="M 16 156 L 16 140 L 32 140"></path>
    <path d="M 304 140 L 320 140 L 320 156"></path>
    <path d="M 16 232 L 16 248 L 32 248"></path>
    <path d="M 304 248 L 320 248 L 320 232"></path>
    <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <text x="168" y="288" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#22D3EE" letter-spacing="-0.02em" filter="url(#ssCyanGlow)">187 ms</text>
  <text x="168" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">SETTLED · FINAL</text>

  <text x="168" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4A5578" letter-spacing="0.06em">24/7 instant settlement
    <tspan fill="#7A88AC"> · </tspan>
    <tspan fill="#22D3EE">no SWIFT</tspan>
  </text>
</svg>
