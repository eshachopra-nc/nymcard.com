      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.3;0.357;0.786;0.929;1" dur="7s" repeatCount="indefinite"></animate>
      <animateTransform attributeName="transform" type="scale" values="0.88;0.88;1;1;0.94;0.88" keyTimes="0;0.3;0.357;0.786;0.929;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    </g>
