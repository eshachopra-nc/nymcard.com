            <text x="276" y="88" text-anchor="end" font-size="7" fill="#7A839E">#INV-4825</text>

            <circle cx="66" cy="76" r="6" fill="#FF9900"></circle>
            <path d="M 61 78 Q 66 82 71 78" stroke="#1F2C4D" stroke-width="1" fill="none" stroke-linecap="round"></path>
            <text x="76" y="79" font-size="9" font-weight="700" fill="#1F2C4D" letter-spacing="-0.02em">amazon</text>

            <rect x="60" y="96" width="80" height="2.5" rx="1" fill="#C9CDD9"></rect>
            <rect x="60" y="103" width="60" height="2" rx="1" fill="#D8DCE6"></rect>
            <rect x="60" y="110" width="70" height="2" rx="1" fill="#D8DCE6"></rect>

            <line x1="60" y1="128" x2="276" y2="128" stroke="#C9CDD9" stroke-width="0.5"></line>

            <text x="60" y="142" font-size="7" font-weight="600" fill="#8B95AC" letter-spacing="0.05em">ITEMS</text>
