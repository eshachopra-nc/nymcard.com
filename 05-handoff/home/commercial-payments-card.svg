<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="cpPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6EC"></stop>
      <stop offset="100%" stop-color="#F1EAD8"></stop>
    </linearGradient>

    <linearGradient id="cpScanBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="22%" stop-color="#22D3EE" stop-opacity="0.22"></stop>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.55"></stop>
      <stop offset="85%" stop-color="#22D3EE" stop-opacity="0.82"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.95"></stop>
    </linearGradient>

    <linearGradient id="cpScanHalo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="cpScanShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1A33" stop-opacity="0.40"></stop>
      <stop offset="55%" stop-color="#0E1A33" stop-opacity="0.16"></stop>
      <stop offset="100%" stop-color="#0E1A33" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="cpScanBloom" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur stdDeviation="3.2"></feGaussianBlur>
    </filter>

    <filter id="cpScanHaloBlur" x="-15%" y="-100%" width="130%" height="300%">
      <feGaussianBlur stdDeviation="8"></feGaussianBlur>
    </filter>

    <filter id="cpEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>

    <filter id="cpPaperShadow" x="-15%" y="-10%" width="130%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0E1A33" flood-opacity="0.18"></feDropShadow>
    </filter>

    <filter id="cpChipShadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0E1A33" flood-opacity="0.28"></feDropShadow>
    </filter>

    <filter id="cpCyanGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#22D3EE" flood-opacity="0.55"></feDropShadow>
    </filter>

    <clipPath id="cpInvoiceClip">
      <rect x="48" y="54" width="240" height="252" rx="4"></rect>
    </clipPath>
  </defs>

  <text x="168" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0E1A33" letter-spacing="0.22em" opacity="0">SCAN IN PROCESS..
    <animate attributeName="opacity" values="0;0.85;0.45;0.85;0.45;0;0" keyTimes="0;0.057;0.11;0.18;0.25;0.28;1" dur="7s" repeatCount="indefinite"></animate>
  </text>

