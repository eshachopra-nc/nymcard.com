      <animateTransform attributeName="transform" type="scale" values="0.90;0.90;1;1;0.95;0.90" keyTimes="0;0.414;0.471;0.786;0.929;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
