      <text x="-18" y="7" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#FFFFFF">Daniel Cho</text>
      <text x="-18" y="16" font-family="Inter, system-ui, sans-serif" font-size="6" fill="#7A88AC">Finance</text>

      <circle cx="-30" cy="30" r="8" fill="#304DBB"></circle>
      <text x="-30" y="33" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">ML</text>
      <text x="-18" y="29" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#FFFFFF">Maya Lindgren</text>
