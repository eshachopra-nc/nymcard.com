<svg width="900" height="1200" viewBox="0 0 900 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>nCore AI-native layered stack</title>
  <desc>Isometric nCore stack with nine labeled product layers and animated cyan glow traces.</desc>

  <defs>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.85  0 0 0 0 1  0 0 0 0.95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="edge" x1="180" y1="80" x2="720" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="0.48" stop-color="#7F8EA8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.75"/>
    </linearGradient>

    <linearGradient id="cyanEdge" x1="175" y1="200" x2="735" y2="990" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0.35"/>
    </linearGradient>

    <radialGradient id="ambient" cx="50%" cy="44%" r="60%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="0.38" stop-color="#304DBB" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#020305" stop-opacity="0"/>
    </radialGradient>

    <style>
      .layer-line {
        stroke-dasharray: 420 980;
        stroke-dashoffset: 1280;
        animation: trace 5.5s ease-in-out infinite;
      }
      .layer-line:nth-of-type(2) { animation-delay: .18s; }
      .layer-line:nth-of-type(3) { animation-delay: .36s; }
      .layer-line:nth-of-type(4) { animation-delay: .54s; }
      .layer-line:nth-of-type(5) { animation-delay: .72s; }
      .layer-line:nth-of-type(6) { animation-delay: .9s; }
      .layer-line:nth-of-type(7) { animation-delay: 1.08s; }
      .layer-line:nth-of-type(8) { animation-delay: 1.26s; }
      .layer-line:nth-of-type(9) { animation-delay: 1.44s; }

      .pulse {
        animation: pulse 2.4s ease-in-out infinite;
      }

      @keyframes trace {
        0% { stroke-dashoffset: 1280; opacity: 0.15; }
        20% { opacity: 1; }
        55% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: -680; opacity: 0.15; }
      }

      @keyframes pulse {
        0%, 100% { opacity: .48; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="900" height="1200" fill="#020305"/>
  <ellipse cx="455" cy="570" rx="410" ry="560" fill="url(#ambient)"/>

  <!-- side dotted guides -->
  <path d="M180 230V960" stroke="#22D3EE" stroke-opacity=".45" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 12"/>
  <path d="M720 230V960" stroke="#22D3EE" stroke-opacity=".45" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 12"/>

  <!-- top nCore slab -->
  <g filter="url(#softGlow)">
    <path d="M450 70 L735 220 L450 370 L165 220 Z" fill="#061018" fill-opacity=".88" stroke="url(#edge)" stroke-width="1.5"/>
    <path d="M165 220V258C165 265 170 271 177 275L438 413C446 417 454 417 462 413L723 275C730 271 735 265 735 258V220"
          fill="#061018" fill-opacity=".55" stroke="url(#edge)" stroke-width="1.15"/>
    <path d="M165 220 L450 370 L735 220" stroke="#22D3EE" stroke-opacity=".7" stroke-width="2" filter="url(#cyanGlow)"/>
    <text x="450" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="700" fill="#F8FBFF" letter-spacing="-2">nCore</text>
  </g>

  <!-- layers -->
  <g font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="23" fill="#F4F8FF" letter-spacing="3" filter="url(#softGlow)">
    <!-- Each layer is a diamond slab -->
    <g transform="translate(0 0)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">CARDS</text>
      <path d="M250 381h26v18h-26zM254 387h18" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
    <g transform="translate(0 68)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">LENDING</text>
      <circle cx="263" cy="390" r="16" stroke="#DCEFFF" stroke-width="1.7" fill="none"/><text x="263" y="397" text-anchor="middle" font-size="19" letter-spacing="0">$</text>
    </g>
    <g transform="translate(0 136)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">CROSS-BORDER &amp; FX</text>
      <circle cx="263" cy="390" r="16" stroke="#DCEFFF" stroke-width="1.7" fill="none"/><path d="M247 390h32M263 374c8 9 8 23 0 32M263 374c-8 9-8 23 0 32" stroke="#DCEFFF" stroke-width="1.3"/>
    </g>
    <g transform="translate(0 204)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">IDENTITY</text>
      <path d="M249 405v-25h28v25zM255 391c0-9 16-9 16 0" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
    <g transform="translate(0 272)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">FRAUD</text>
      <path d="M263 373l18 7v14c0 12-8 21-18 26-10-5-18-14-18-26v-14z" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
    <g transform="translate(0 340)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">RISK</text>
      <path d="M263 372l22 40h-44zM263 386v12M263 406v2" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
    <g transform="translate(0 408)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">3D SECURE</text>
      <path d="M247 376h32v28h-32zM253 382h10M253 390h20M253 398h14" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
    <g transform="translate(0 476)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">SETTLEMENT</text>
      <path d="M245 405h36M250 399v-20M263 399v-20M276 399v-20M243 379h40l-20-12z" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
    <g transform="translate(0 544)">
      <path d="M450 250 L735 400 L450 550 L165 400 Z" fill="#061018" fill-opacity=".5" stroke="url(#edge)" stroke-width="1.15"/>
      <text x="285" y="394">RECONCILIATION</text>
      <path d="M250 382c6-8 21-9 28 1M279 383v-9M277 401c-7 8-22 8-29-1M248 400v9" stroke="#DCEFFF" stroke-width="1.7" fill="none"/>
    </g>
  </g>

  <!-- animated cyan AI path across each layer -->
  <g filter="url(#cyanGlow)" stroke="url(#cyanEdge)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path class="layer-line" d="M615 340 L720 395 L720 407 L450 550 L165 400" />
    <path class="layer-line" d="M615 408 L720 463 L720 475 L450 618 L165 468" />
    <path class="layer-line" d="M615 476 L720 531 L720 543 L450 686 L165 536" />
    <path class="layer-line" d="M615 544 L720 599 L720 611 L450 754 L165 604" />
    <path class="layer-line" d="M615 612 L720 667 L720 679 L450 822 L165 672" />
    <path class="layer-line" d="M615 680 L720 735 L720 747 L450 890 L165 740" />
    <path class="layer-line" d="M615 748 L720 803 L720 815 L450 958 L165 808" />
    <path class="layer-line" d="M615 816 L720 871 L720 883 L450 1026 L165 876" />
    <path class="layer-line" d="M615 884 L720 939 L720 951 L450 1094 L165 944" />
  </g>

  <!-- glowing nodes -->
  <g filter="url(#cyanGlow)" fill="#22D3EE">
    <circle class="pulse" cx="615" cy="340" r="6"/>
    <circle class="pulse" cx="615" cy="408" r="6"/>
    <circle class="pulse" cx="615" cy="476" r="6"/>
    <circle class="pulse" cx="615" cy="544" r="6"/>
    <circle class="pulse" cx="615" cy="612" r="6"/>
    <circle class="pulse" cx="615" cy="680" r="6"/>
    <circle class="pulse" cx="615" cy="748" r="6"/>
    <circle class="pulse" cx="615" cy="816" r="6"/>
    <circle class="pulse" cx="615" cy="884" r="6"/>
  </g>

  <text x="450" y="1138" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="18" fill="#22D3EE" letter-spacing="10">
    AI-NATIVE ACROSS EVERY LAYER
  </text>
</svg>