<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="rcNodeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0BEDC"></stop>
      <stop offset="100%" stop-color="#B0BEDC"></stop>
    </linearGradient>

    <filter id="rcChipShadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#B0BEDC" flood-opacity="0.32"></feDropShadow>
    </filter>

    <filter id="rcCyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22D3EE" flood-opacity="0.75"></feDropShadow>
    </filter>

    <filter id="rcVioletGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#5B4FD9" flood-opacity="0.70"></feDropShadow>
    </filter>

    <filter id="rcEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>
  </defs>

  <g>
    <circle cx="100" cy="25" r="3" fill="#22D3EE" fill-opacity="0.55">
      <animate attributeName="r" values="3;11;11" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
      <animate attributeName="fill-opacity" values="0.55;0;0" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="100" cy="25" r="3" fill="#22D3EE"></circle>
    <text x="112" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#B0BEDC" letter-spacing="0.20em">MATCHING · LIVE</text>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 180)">
      <g opacity="0" filter="url(#rcEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.86;1;1;0.97;0.86" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -180)">

          <line x1="100" y1="180" x2="140" y2="180" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"></line>
          <line x1="196" y1="180" x2="236" y2="180" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"></line>

          <g transform="translate(60 180)" filter="url(#rcChipShadow)">
            <rect x="-40" y="-40" width="80" height="80" rx="14" fill="url(#rcNodeFill)" stroke="#22D3EE" stroke-opacity="0.50" stroke-width="1.2"></rect>
            <text x="0" y="-20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">CARD</text>
            <g transform="translate(0 8)">
              <rect x="-22" y="-12" width="44" height="28" rx="4" fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="1.2"></rect>
              <rect x="-18" y="-8" width="10" height="7" rx="1.5" fill="#FFFFFF" fill-opacity="0.45"></rect>
              <line x1="-18" y1="6" x2="14" y2="6" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="0.8" stroke-linecap="round"></line>
              <line x1="-18" y1="10" x2="6" y2="10" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="0.8" stroke-linecap="round"></line>
            </g>
          </g>

          <g transform="translate(168 180)">
            <circle r="38" fill="#22D3EE" filter="url(#rcCyanGlow)">
              <animate attributeName="r" values="36;40;36" dur="2.4s" repeatCount="indefinite"></animate>
            </circle>
            <path d="M -16 0 L -6 11 L 16 -11" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
          </g>

          <g transform="translate(276 180)" filter="url(#rcChipShadow)">
            <rect x="-40" y="-40" width="80" height="80" rx="14" fill="url(#rcNodeFill)" stroke="#22D3EE" stroke-opacity="0.50" stroke-width="1.2"></rect>
            <text x="0" y="-20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#22D3EE" letter-spacing="0.20em">BANK</text>
            <g transform="translate(0 12)" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="1.2" stroke-linecap="round" fill="none">
              <path d="M -26 -10 L 0 -18 L 26 -10"></path>
              <line x1="-22" y1="-6" x2="-22" y2="12"></line>
              <line x1="-10" y1="-6" x2="-10" y2="12"></line>
              <line x1="10" y1="-6" x2="10" y2="12"></line>
              <line x1="22" y1="-6" x2="22" y2="12"></line>
              <line x1="-26" y1="14" x2="26" y2="14"></line>
            </g>
          </g>

        </g>
      </g>
    </g>
  </g>

  <g stroke="#22D3EE" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#rcCyanGlow)">
    <path d="M 12 132 L 12 116 L 28 116"></path>
    <path d="M 308 116 L 324 116 L 324 132"></path>
    <path d="M 12 228 L 12 244 L 28 244"></path>
    <path d="M 308 244 L 324 244 L 324 228"></path>
    <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <text x="168" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#B0BEDC" letter-spacing="-0.02em">98.4%</text>
  <text x="168" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#22D3EE" letter-spacing="0.22em">MATCHED</text>

  <g transform="translate(168 332)" filter="url(#rcVioletGlow)">
    <rect x="-44" y="-10" width="88" height="20" rx="10" fill="#5B4FD9">
      <animate attributeName="fill-opacity" values="0.85;1;0.85" dur="1.6s" repeatCount="indefinite"></animate>
    </rect>
    <text x="0" y="4" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">Δ 1 REVIEW</text>
  </g>
</svg>
