<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 680" width="1440" height="680" preserveAspectRatio="xMidYMid slice">
  <defs>
    <clipPath id="frame-dark">
      <rect width="1440" height="680"></rect>
    </clipPath>

    
    <linearGradient id="ribbon-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0"></stop>
      <stop offset="18%" stop-color="#0EA5E9" stop-opacity="0.45"></stop>
      <stop offset="38%" stop-color="#5B4FD9" stop-opacity="0.58"></stop>
      <stop offset="55%" stop-color="#304DBB" stop-opacity="0.50"></stop>
      <stop offset="72%" stop-color="#5B4FD9" stop-opacity="0.26"></stop>
      <stop offset="92%" stop-color="#5B4FD9" stop-opacity="0"></stop>
    </linearGradient>

    
    <radialGradient id="halo-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B4FD9" stop-opacity="0.20"></stop>
      <stop offset="100%" stop-color="#5B4FD9" stop-opacity="0"></stop>
    </radialGradient>

    
    <linearGradient id="left-dark" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="748" y2="0">
      <stop offset="0%" stop-color="#0E1A33"></stop>
      <stop offset="21%" stop-color="#0E1A33"></stop>
      <stop offset="69%" stop-color="#0E1A33" stop-opacity="0.60"></stop>
      <stop offset="100%" stop-color="#0E1A33" stop-opacity="0"></stop>
    </linearGradient>

    
    <linearGradient id="bottom-dark" gradientUnits="userSpaceOnUse" x1="0" y1="550" x2="0" y2="680">
      <stop offset="0%" stop-color="#0E1A33" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#0E1A33"></stop>
    </linearGradient>
  </defs>

  
  <rect width="1440" height="680" fill="#0E1A33"></rect>

  <g clip-path="url(#frame-dark)">
    
    <rect x="604.8" y="-544" width="936" height="1904" fill="url(#ribbon-dark)" transform="rotate(-24 604.8 -544)"></rect>

    
    <ellipse cx="1181" cy="272" rx="792" ry="442" fill="url(#halo-dark)"></ellipse>

    
    <rect width="1440" height="680" fill="url(#left-dark)"></rect>

    
    <rect x="0" y="550" width="1440" height="130" fill="url(#bottom-dark)"></rect>
