<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="vcCardFront" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="38%" stop-color="#5B4FD9"></stop>
      <stop offset="72%" stop-color="#6E8FE0"></stop>
      <stop offset="100%" stop-color="#1F3389"></stop>
    </linearGradient>

    <linearGradient id="vcCardLeft" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5B4FD9"></stop>
      <stop offset="50%" stop-color="#6E8FE0"></stop>
      <stop offset="100%" stop-color="#B0BEDC"></stop>
    </linearGradient>

    <linearGradient id="vcCardRight" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="50%" stop-color="#6E8FE0"></stop>
      <stop offset="100%" stop-color="#1F3389"></stop>
    </linearGradient>

    <linearGradient id="vcSheen" x1="0" x2="1" y1="0" y2="0" spreadMethod="repeat">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.65"></stop>
      <stop offset="75%" stop-color="#22D3EE" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <animate attributeName="x1" values="0;1" dur="11s" repeatCount="indefinite"></animate>
      <animate attributeName="x2" values="1;2" dur="11s" repeatCount="indefinite"></animate>
    </linearGradient>

    <linearGradient id="vcChipBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"></stop>
      <stop offset="100%" stop-color="#CBD5E1"></stop>
    </linearGradient>

    <linearGradient id="vcTopHighlight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="vcBlurM" x="-8%" y="-8%" width="116%" height="116%"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter>

    <filter id="vcCardShadow" x="-20%" y="-15%" width="140%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#B0BEDC" flood-opacity="0.32"></feDropShadow>
    </filter>

    <filter id="vcEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>

    <clipPath id="vcFrontClip">
      <rect x="103" y="70" width="130" height="200" rx="14"></rect>
    </clipPath>
  </defs>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 180)">
      <g opacity="0" filter="url(#vcEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.86;1;1;0.97;0.86" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -180)">

          <g transform="rotate(-18 168 360)">
            <rect x="103" y="70" width="130" height="200" rx="14" fill="url(#vcCardLeft)" filter="url(#vcCardShadow)"></rect>
            <path d="M 113 72 H 223" stroke="url(#vcTopHighlight)" stroke-width="1" fill="none"></path>
          </g>

          <g transform="rotate(18 168 360)">
            <rect x="103" y="70" width="130" height="200" rx="14" fill="url(#vcCardRight)" filter="url(#vcCardShadow)"></rect>
            <path d="M 113 72 H 223" stroke="url(#vcTopHighlight)" stroke-width="1" fill="none"></path>
          </g>

          <g>
            <rect x="103" y="70" width="130" height="200" rx="14" fill="url(#vcCardFront)" filter="url(#vcCardShadow)"></rect>

            <g clip-path="url(#vcFrontClip)">
              <g filter="url(#vcBlurM)" opacity="0.75">
                <path d="M 60 200 C 110 170, 160 156, 220 144 S 320 130, 400 124" fill="none" stroke="url(#vcSheen)" stroke-width="34" stroke-linecap="round"></path>
              </g>

              <path d="M 113 72 H 223" stroke="url(#vcTopHighlight)" stroke-width="1" fill="none"></path>
            </g>

            <g transform="translate(118 96)">
              <rect width="34" height="26" rx="5" fill="url(#vcChipBase)"></rect>
              <rect width="34" height="26" rx="5" fill="#FFFFFF" fill-opacity="0.18"></rect>
              <g fill="none" stroke="#9AA9CE" stroke-width="0.6" stroke-linecap="round" stroke-opacity="0.85">
                <rect x="2" y="2" width="30" height="22" rx="2"></rect>
                <line x1="2" y1="13" x2="32" y2="13"></line>
                <line x1="11.5" y1="2" x2="11.5" y2="10"></line>
                <line x1="22.5" y1="2" x2="22.5" y2="10"></line>
                <line x1="11.5" y1="16" x2="11.5" y2="24"></line>
                <line x1="22.5" y1="16" x2="22.5" y2="24"></line>
                <rect x="12" y="9.5" width="10" height="7" fill="#9AA9CE" fill-opacity="0.22"></rect>
              </g>
            </g>

            <g transform="translate(216 96)" fill="none" stroke="#FFFFFF" stroke-linecap="round">
              <path d="M 0 -8 A 11 11 0 0 1 0 8" stroke-width="1.8"></path>
              <path d="M -3 -6 A 7 7 0 0 1 -3 6" stroke-width="1.6" stroke-opacity="0.78"></path>
              <path d="M -6 -3 A 3 3 0 0 1 -6 3" stroke-width="1.4" stroke-opacity="0.52"></path>
            </g>

          </g>

        </g>
      </g>
    </g>
  </g>
</svg>
