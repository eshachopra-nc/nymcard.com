<svg width="2400" height="920" viewBox="0 0 2400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>NymCard kinetic gradient ribbon</title>
  <desc>Wide diagonal kinetic gradient ribbon using NymCard blues, cyan, and restrained violet for hero backgrounds.</desc>

  <defs>
    <linearGradient id="nymRibbonGradient" x1="140" y1="700" x2="2260" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.20" stop-color="#0EA5E9"/>
      <stop offset="0.42" stop-color="#304DBB"/>
      <stop offset="0.58" stop-color="#5B4FD9"/>
      <stop offset="0.78" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>

    <linearGradient id="nymRibbonHighlight" x1="100" y1="620" x2="2300" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.25"/>
      <stop offset="0.28" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.50" stop-color="#7C7CFF" stop-opacity="0.25"/>
      <stop offset="0.82" stop-color="#22D3EE" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="softBloom" x="-12%" y="-60%" width="124%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <filter id="edgeGlow" x="-12%" y="-60%" width="124%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <clipPath id="ribbonClip">
      <path d="M-70 524 L2470 0 L2470 385 L-70 920 Z"/>
    </clipPath>

    <style>
      .ribbon-core {
        animation: gradientDrift 9s ease-in-out infinite alternate;
        transform-origin: center;
      }

      .ribbon-highlight {
        animation: highlightDrift 7s ease-in-out infinite alternate;
        transform-origin: center;
      }

      .ribbon-glow {
        animation: glowPulse 6s ease-in-out infinite;
      }

      @keyframes gradientDrift {
        0% { transform: translateX(-42px) translateY(12px) skewY(-0.3deg); opacity: 0.95; }
        100% { transform: translateX(42px) translateY(-12px) skewY(0.3deg); opacity: 1; }
      }

      @keyframes highlightDrift {
        0% { transform: translateX(70px); opacity: 0.22; }
        100% { transform: translateX(-70px); opacity: 0.48; }
      }

      @keyframes glowPulse {
        0%, 100% { opacity: 0.36; }
        50% { opacity: 0.62; }
      }

      @media (prefers-reduced-motion: reduce) {
        .ribbon-core, .ribbon-highlight, .ribbon-glow {
          animation: none;
        }
      }
    </style>
  </defs>

  <g clip-path="url(#ribbonClip)">
    <path class="ribbon-glow" d="M-110 690 C440 570 760 460 1160 380 C1550 302 1930 210 2510 90"
          stroke="url(#nymRibbonGradient)" stroke-width="360" stroke-linecap="round" opacity="0.5" filter="url(#softBloom)"/>
  </g>

  <g class="ribbon-core" clip-path="url(#ribbonClip)">
    <path d="M-120 710 C380 592 755 485 1115 405 C1485 322 1860 238 2520 86"
          stroke="url(#nymRibbonGradient)" stroke-width="355" stroke-linecap="butt"/>

    <path d="M-130 750 C380 645 760 545 1130 458 C1490 374 1875 288 2530 152"
          stroke="url(#nymRibbonHighlight)" stroke-width="185" stroke-linecap="butt" opacity="0.52"/>

    <path d="M-120 610 C385 506 740 420 1115 334 C1505 245 1900 160 2525 20"
          stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.13" filter="url(#edgeGlow)"/>
  </g>

  <g class="ribbon-highlight" clip-path="url(#ribbonClip)" opacity="0.9">
    <path d="M-80 575 C385 492 740 404 1100 318 C1480 228 1885 145 2475 20"
          stroke="#22D3EE" stroke-width="92" stroke-linecap="round" opacity="0.22" filter="url(#softBloom)"/>

    <path d="M-90 790 C380 690 770 590 1145 500 C1505 414 1900 328 2470 210"
          stroke="#FFFFFF" stroke-width="72" stroke-linecap="round" opacity="0.12" filter="url(#softBloom)"/>

    <path d="M-85 710 C420 598 785 508 1130 430 C1508 344 1875 260 2480 130"
          stroke="#5B4FD9" stroke-width="96" stroke-linecap="round" opacity="0.18" filter="url(#softBloom)"/>
  </g>

  <path d="M-70 524 L2470 0" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M-70 920 L2470 385" stroke="#304DBB" stroke-opacity="0.16" stroke-width="2"/>
</svg>