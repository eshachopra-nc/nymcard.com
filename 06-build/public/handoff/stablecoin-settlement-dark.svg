<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <linearGradient id="ssFiatFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0BEDC"></stop>
      <stop offset="100%" stop-color="#1F2C4D"></stop>
    </linearGradient>

    <linearGradient id="ssBridgeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2C4D"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.30"></stop>
    </linearGradient>

    <filter id="ssChipShadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#B0BEDC" flood-opacity="0.35"></feDropShadow>
    </filter>

    <filter id="ssCyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22D3EE" flood-opacity="0.65"></feDropShadow>
    </filter>

    <filter id="ssBridgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22D3EE" flood-opacity="0.55"></feDropShadow>
    </filter>

    <filter id="ssEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>
  </defs>

  <g>
    <circle cx="100" cy="25" r="3" fill="#22D3EE" fill-opacity="0.55">
      <animate attributeName="r" values="3;11;11" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
      <animate attributeName="fill-opacity" values="0.55;0;0" keyTimes="0;0.65;1" dur="1.6s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="100" cy="25" r="3" fill="#0EA5E9"></circle>
    <text x="112" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#B0BEDC" letter-spacing="0.20em">INSTANT · SETTLEMENT</text>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 180)">
      <g opacity="0" filter="url(#ssEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.86;1;1;0.97;0.86" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -180)">

          <text x="119" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#6E8FE0" letter-spacing="0.22em">ON-RAMP</text>
          <text x="217" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#6E8FE0" letter-spacing="0.22em">OFF-RAMP</text>

          <g filter="url(#ssChipShadow)">
            <rect x="36" y="152" width="72" height="64" rx="14" fill="url(#ssFiatFill)" stroke="#22D3EE" stroke-opacity="0.40" stroke-width="1"></rect>
            <text x="72" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22D3EE">$</text>
            <text x="72" y="206" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" letter-spacing="0.16em">USD</text>
          </g>

          <g transform="translate(119 184)">
            <line x1="-11" y1="0" x2="11" y2="0" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85"></line>
            <path d="M 5 -5 L 11 0 L 5 5" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#ssCyanGlow)"></path>
          </g>

          <g filter="url(#ssBridgeGlow)">
            <rect x="130" y="144" width="76" height="80" rx="14" fill="url(#ssBridgeFill)" stroke="#22D3EE" stroke-width="1.6">
              <animate attributeName="stroke-opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite"></animate>
            </rect>
          </g>
          <text x="168" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#22D3EE" letter-spacing="0.22em">STABLECOIN</text>
          <g transform="translate(155 184)">
            <circle r="7" fill="#22D3EE"></circle>
            <circle r="2.8" fill="#FFFFFF"></circle>
          </g>
          <text x="186" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">USDC</text>
          <text x="168" y="212" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="7" fill="#A8B5D9" letter-spacing="0.04em">$50,000</text>

          <g transform="translate(217 184)">
            <line x1="-11" y1="0" x2="11" y2="0" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85"></line>
            <path d="M 5 -5 L 11 0 L 5 5" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#ssCyanGlow)"></path>
          </g>

          <g filter="url(#ssChipShadow)">
            <rect x="228" y="152" width="72" height="64" rx="14" fill="url(#ssFiatFill)" stroke="#22D3EE" stroke-opacity="0.40" stroke-width="1"></rect>
            <text x="264" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#22D3EE">$</text>
            <text x="264" y="206" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" letter-spacing="0.16em">USD</text>
          </g>

        </g>
      </g>
    </g>
  </g>

  <g stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#ssCyanGlow)">
    <path d="M 20 144 L 20 128 L 36 128"></path>
    <path d="M 300 128 L 316 128 L 316 144"></path>
    <path d="M 20 232 L 20 248 L 36 248"></path>
    <path d="M 300 248 L 316 248 L 316 232"></path>
    <animate attributeName="opacity" values="0.30;1;0.30" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <text x="168" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#6E8FE0" letter-spacing="-0.02em">187 ms</text>
  <text x="168" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#B0BEDC" letter-spacing="0.22em">SETTLED · FINAL</text>

  <text x="168" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9AA9CE" letter-spacing="0.04em">24/7 instant settlement<tspan fill="#AEBCDE"> · </tspan><tspan fill="#6E8FE0" font-weight="700">no SWIFT</tspan></text>
</svg>
