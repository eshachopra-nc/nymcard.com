<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 360" width="336" height="360">
  <defs>
    <radialGradient id="idDiskGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"></stop>
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0.04"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="idChipShadow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0E1A33" flood-opacity="0.28"></feDropShadow>
    </filter>

    <filter id="idCyanGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#22D3EE" flood-opacity="0.55"></feDropShadow>
    </filter>

    <linearGradient id="idScanBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="22%" stop-color="#22D3EE" stop-opacity="0.22"></stop>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.55"></stop>
      <stop offset="85%" stop-color="#22D3EE" stop-opacity="0.82"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.95"></stop>
    </linearGradient>

    <linearGradient id="idScanHalo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.40"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="idScanShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1A33" stop-opacity="0.55"></stop>
      <stop offset="55%" stop-color="#0E1A33" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#0E1A33" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="idScanBloom" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur stdDeviation="3.2"></feGaussianBlur>
    </filter>

    <filter id="idScanHaloBlur" x="-15%" y="-100%" width="130%" height="300%">
      <feGaussianBlur stdDeviation="8"></feGaussianBlur>
    </filter>

    <filter id="idEntryBlur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0">
        <animate attributeName="stdDeviation" values="3;0;0;3;3" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
      </feGaussianBlur>
    </filter>

    <clipPath id="idDiskClip">
      <circle cx="168" cy="130" r="80"></circle>
    </clipPath>
  </defs>

  <text x="168" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0E1A33" letter-spacing="0.22em" opacity="0">VERIFYING IDENTITY..
    <animate attributeName="opacity" values="0;0.85;0.45;0.85;0.45;0;0" keyTimes="0;0.057;0.11;0.18;0.25;0.28;1" dur="7s" repeatCount="indefinite"></animate>
  </text>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 -12;0 0;0 0;0 0;0 -12" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    <g transform="translate(168 130)">
      <g opacity="0" filter="url(#idEntryBlur)">
        <animateTransform attributeName="transform" type="scale" values="0.85;1;1;0.97;0.85" keyTimes="0;0.043;0.929;0.99;1" dur="7s" calcMode="spline" keySplines="0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.043;0.929;0.99;1" dur="7s" repeatCount="indefinite"></animate>
        <g transform="translate(-168 -130)">

          <circle cx="168" cy="130" r="96" fill="url(#idDiskGlow)"></circle>

          <circle cx="168" cy="130" r="80" stroke="#22D3EE" stroke-width="1.4" fill="none" stroke-opacity="0.50"></circle>

          <g clip-path="url(#idDiskClip)">
            <rect x="68" y="90" width="200" height="80" fill="url(#idScanShadow)" opacity="0">
              <animate attributeName="y" values="90;90;210;210" keyTimes="0;0.043;0.257;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.6 1;0 0 1 1" repeatCount="indefinite"></animate>
              <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.043;0.07;0.243;0.272;1" dur="7s" repeatCount="indefinite"></animate>
            </rect>

            <rect x="68" y="50" width="200" height="40" fill="url(#idScanBand)" filter="url(#idScanBloom)" opacity="0">
              <animate attributeName="y" values="50;50;170;170" keyTimes="0;0.043;0.257;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.6 1;0 0 1 1" repeatCount="indefinite"></animate>
              <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.043;0.07;0.243;0.272;1" dur="7s" repeatCount="indefinite"></animate>
            </rect>
          </g>

        </g>
      </g>
    </g>
  </g>

  <g stroke="#22D3EE" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#idCyanGlow)">
    <path d="M 76 62 L 76 46 L 92 46"></path>
    <path d="M 244 46 L 260 46 L 260 62"></path>
    <path d="M 76 194 L 76 210 L 92 210"></path>
    <path d="M 244 210 L 260 210 L 260 194"></path>
    <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite"></animate>
  </g>

  <g transform="translate(168 236)" filter="url(#idChipShadow)">
    <g opacity="0">
      <rect x="-120" y="-14" width="240" height="28" rx="14" fill="#1A2747"></rect>
      <circle cx="-104" cy="0" r="7" fill="#22D3EE"></circle>
      <path d="M -108 0 L -105 3 L -100 -3" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
      <text x="-90" y="3.5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FFFFFF">Liveness Check</text>
      <text x="108" y="3.5" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#22D3EE" letter-spacing="0.12em">VERIFIED</text>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.3;0.357;0.786;0.929;1" dur="7s" repeatCount="indefinite"></animate>
      <animateTransform attributeName="transform" type="scale" values="0.92;0.92;1;1;0.96;0.92" keyTimes="0;0.3;0.357;0.786;0.929;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    </g>
  </g>

  <g transform="translate(168 270)" filter="url(#idChipShadow)">
    <g opacity="0">
      <rect x="-120" y="-14" width="240" height="28" rx="14" fill="#1A2747"></rect>
      <circle cx="-104" cy="0" r="7" fill="#22D3EE"></circle>
      <path d="M -108 0 L -105 3 L -100 -3" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
      <text x="-90" y="3.5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FFFFFF">Passport · UK</text>
      <text x="108" y="3.5" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#22D3EE" letter-spacing="0.12em">VERIFIED</text>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.371;0.429;0.786;0.929;1" dur="7s" repeatCount="indefinite"></animate>
      <animateTransform attributeName="transform" type="scale" values="0.92;0.92;1;1;0.96;0.92" keyTimes="0;0.371;0.429;0.786;0.929;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    </g>
  </g>

  <g transform="translate(168 304)" filter="url(#idChipShadow)">
    <g opacity="0">
      <rect x="-120" y="-14" width="240" height="28" rx="14" fill="#1A2747"></rect>
      <circle cx="-104" cy="0" r="7" fill="#22D3EE"></circle>
      <path d="M -108 0 L -105 3 L -100 -3" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
      <text x="-90" y="3.5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FFFFFF">Proof of Address</text>
      <text x="108" y="3.5" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#22D3EE" letter-spacing="0.12em">VERIFIED</text>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.443;0.5;0.786;0.929;1" dur="7s" repeatCount="indefinite"></animate>
      <animateTransform attributeName="transform" type="scale" values="0.92;0.92;1;1;0.96;0.92" keyTimes="0;0.443;0.5;0.786;0.929;1" dur="7s" calcMode="spline" keySplines="0 0 1 1;0.16 1 0.3 1;0 0 1 1;0.4 0 1 1;0 0 1 1" repeatCount="indefinite"></animateTransform>
    </g>
  </g>
</svg>
