<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 620" width="400" height="620">
  <defs>
    <linearGradient id="ciCardBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="32%" stop-color="#5B4FD9"></stop>
      <stop offset="68%" stop-color="#304DBB"></stop>
      <stop offset="100%" stop-color="#1F3389"></stop>
    </linearGradient>
    <linearGradient id="ciSheen2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.75"></stop>
      <stop offset="75%" stop-color="#22D3EE" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="ciSheen3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#5B4FD9" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#A78CFF" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#5B4FD9" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="ciTileBg" cx="0.5" cy="0.55" r="0.75">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.55"></stop>
      <stop offset="40%" stop-color="#5B4FD9" stop-opacity="0.65"></stop>
      <stop offset="75%" stop-color="#304DBB" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="ciTileShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#0F172A" flood-opacity="0.06"></feDropShadow>
    </filter>
    <linearGradient id="ciTopBorder" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"></stop>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.25"></stop>
    </linearGradient>
    <filter id="ciCardShadow" x="-25%" y="-15%" width="150%" height="130%">
      <feDropShadow dx="0" dy="30" stdDeviation="22" flood-color="#5B4FD9" flood-opacity="0.32"></feDropShadow>
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#304DBB" flood-opacity="0.18"></feDropShadow>
    </filter>
    <filter id="ciBlurM" x="-8%" y="-8%" width="116%" height="116%"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter>
    <filter id="ciBlurS" x="-4%" y="-4%" width="108%" height="108%"><feGaussianBlur stdDeviation="1"></feGaussianBlur></filter>
    <filter id="ciTileBgBlur" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur stdDeviation="40"></feGaussianBlur></filter>
    <clipPath id="ciCardClip">
      <rect x="80" y="150" width="240" height="380" rx="18"></rect>
    </clipPath>
    <linearGradient id="ciChipBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"></stop>
      <stop offset="100%" stop-color="#CBD5E1"></stop>
    </linearGradient>
  </defs>

  <g filter="url(#ciTileBgBlur)">
    <ellipse cx="200" cy="340" rx="240" ry="280" fill="url(#ciTileBg)"></ellipse>
  </g>

  <g filter="url(#ciTileShadow)">
    <rect x="4" y="4" width="392" height="612" rx="24" fill="#FFFFFF" fill-opacity="0.20" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"></rect>
  </g>
  <path d="M 28 5 H 372" stroke="url(#ciTopBorder)" stroke-width="1" fill="none"></path>

  <text x="40" y="44" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#304DBB" letter-spacing="0.08em">Issuing Processing</text>
  <text x="40" y="80" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" fill="#0E1A33" letter-spacing="-0.01em">Launch a card</text>
  <text x="40" y="112" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" fill="#0E1A33" letter-spacing="-0.01em">program</text>

  <!-- Expand affordance is rendered as a React overlay (CardExpandChip),
       not embedded here, so the hover state stays consistent across cards. -->

  <g filter="url(#ciCardShadow)">
    <rect x="80" y="150" width="240" height="380" rx="18" fill="url(#ciCardBg)"></rect>
  </g>

  <g clip-path="url(#ciCardClip)">
    <g filter="url(#ciBlurM)" opacity="0.75" transform="translate(0 0)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-6 3;0 0" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"></animateTransform>
      <path d="M -40 410 C 60 360, 160 340, 240 320 S 360 290, 460 280" fill="none" stroke="url(#ciSheen2)" stroke-width="55" stroke-linecap="round"></path>
    </g>
    <g filter="url(#ciBlurM)" opacity="0.6" transform="translate(0 0)">
      <animateTransform attributeName="transform" type="translate" values="0 0;5 -2;0 0" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"></animateTransform>
      <path d="M -40 350 C 60 300, 160 280, 240 270 S 360 260, 460 250" fill="none" stroke="url(#ciSheen3)" stroke-width="40" stroke-linecap="round"></path>
    </g>

    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" filter="url(#ciBlurS)" transform="translate(0 0)">
      <animateTransform attributeName="transform" type="translate" values="0 0;6 -2;0 0" dur="13s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"></animateTransform>
      <path d="M -40 370 C 60 320, 160 300, 240 280 S 360 260, 460 250" stroke-width="1.5" stroke-opacity="0.88"></path>
      <path d="M -40 390 C 60 340, 160 320, 240 300 S 360 280, 460 270" stroke-width="1" stroke-opacity="0.65"></path>
      <path d="M -40 405 C 60 360, 160 340, 240 320 S 360 300, 460 295" stroke-width="0.8" stroke-opacity="0.50"></path>
    </g>

    <line x1="82" y1="152" x2="318" y2="152" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1"></line>
    <line x1="82" y1="528" x2="318" y2="528" stroke="#000000" stroke-opacity="0.12" stroke-width="1"></line>
  </g>


  <g transform="translate(178 226)">
    <rect width="44" height="32" rx="5" fill="url(#ciChipBase)"></rect>
    <rect width="44" height="32" rx="5" fill="#FFFFFF" fill-opacity="0.25"></rect>
    <g fill="none" stroke="#94A3B8" stroke-width="0.7" stroke-linecap="round">
      <rect x="3" y="3" width="38" height="26" rx="2"></rect>
      <line x1="3" y1="16" x2="41" y2="16"></line>
      <line x1="14" y1="3" x2="14" y2="13"></line>
      <line x1="30" y1="3" x2="30" y2="13"></line>
      <line x1="14" y1="19" x2="14" y2="29"></line>
      <line x1="30" y1="19" x2="30" y2="29"></line>
      <rect x="15" y="11" width="14" height="10" fill="#94A3B8" fill-opacity="0.18"></rect>
      <line x1="3" y1="13" x2="15" y2="13"></line>
      <line x1="29" y1="13" x2="41" y2="13"></line>
      <line x1="3" y1="19" x2="15" y2="19"></line>
      <line x1="29" y1="19" x2="41" y2="19"></line>
    </g>
  </g>

  <g transform="translate(244 242)" fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <path d="M 0 -12 A 16 16 0 0 1 0 12" stroke-width="2.4"></path>
    <path d="M -4 -8 A 11 11 0 0 1 -4 8" stroke-width="2.2" stroke-opacity="0.75"></path>
    <path d="M -8 -4 A 6 6 0 0 1 -8 4" stroke-width="2" stroke-opacity="0.50"></path>
  </g>

  <g transform="translate(258 498) scale(0.20)" fill="#FFFFFF">
    <path d="M170.9,0c-18.6,0-35.3,9.7-35.3,27.5c0,20.5,29.5,21.9,29.5,32.1c0,4.3-5,8.2-13.4,8.2c-12,0-21-5.4-21-5.4l-3.8,18c0,0,10.3,4.6,24.1,4.6c20.4,0,36.4-10.1,36.4-28.3c0-21.6-29.6-23-29.6-32.5c0-3.4,4.1-7.1,12.5-7.1c9.5,0,17.3,3.9,17.3,3.9l3.8-17.4C191.3,3.6,182.8,0,170.9,0L170.9,0z M0.5,1.3L0,3.9c0,0,7.8,1.4,14.9,4.3c9.1,3.3,9.7,5.2,11.3,11.1l16.7,64.3h22.4L99.6,1.3H77.3l-22.1,56l-9-47.5c-0.8-5.4-5-8.5-10.2-8.5C36,1.3,0.5,1.3,0.5,1.3z M108.6,1.3L91.1,83.6h21.3l17.4-82.3L108.6,1.3L108.6,1.3z M227.2,1.3c-5.1,0-7.8,2.7-9.8,7.5l-31.2,74.8h22.3l4.3-12.5H240l2.6,12.5h19.7L245.2,1.3L227.2,1.3L227.2,1.3z M230.1,23.6l6.6,30.9H219L230.1,23.6L230.1,23.6z"></path>
  </g>
</svg>
