  <!-- Right: Biometric -->
  <g transform="translate(304 76)">
    <rect x="0" y="0" width="252" height="140" rx="10" fill="#0E1A33"/>
    <!-- Face outline -->
    <ellipse cx="126" cy="62" rx="32" ry="40" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <circle cx="116" cy="56" r="2" fill="#22D3EE"/>
    <circle cx="136" cy="56" r="2" fill="#22D3EE"/>
    <path d="M 116 76 Q 126 82 136 76" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Corner brackets -->
    <path d="M 72 18 H 82 M 72 18 V 28" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 180 18 H 170 M 180 18 V 28" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 72 108 H 82 M 72 108 V 98" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 180 108 H 170 M 180 108 V 98" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
