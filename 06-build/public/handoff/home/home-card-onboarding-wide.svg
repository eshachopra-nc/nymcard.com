<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 4 712 172" width="720" height="180">
  <defs>
    <filter id="onbwShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#0F172A" flood-opacity="0"/>
    </filter>
    <linearGradient id="onbwTopBorder" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Glass body -->
  <g filter="url(#onbwShadow)">
    <rect x="4" y="4" width="712" height="172" rx="24" fill="#FFFFFF" fill-opacity="0.7" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1"/>
  </g>
  <path d="M 28 5 H 692" stroke="url(#onbwTopBorder)" stroke-width="1" fill="none"/>

  <!-- LEFT SECTION (x=24-220): label + timer + status -->
  <text x="24" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="0.08em" fill="#6B7280">DIGITAL ONBOARDING</text>

  <text x="24" y="86" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="34" fill="#0E1A33" letter-spacing="-0.01em">00:47</text>
  <text x="24" y="108" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6B7280">Average time to verify</text>

  <g transform="translate(24 132)">
    <circle cx="6" cy="6" r="4" fill="#0EA5E9"/>
    <circle cx="6" cy="6" r="4" fill="#0EA5E9" opacity="0.3"/>
    <text x="20" y="10" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#0E1A33">In progress</text>
  </g>

  <!-- Vertical divider -->
  <line x1="240" y1="36" x2="240" y2="148" stroke="#E5E7EB" stroke-width="1"/>

  <!-- RIGHT SECTION (x=270-692): 4 horizontal steps with connectors -->
  <!-- Step 1: Identity (complete) -->
  <g transform="translate(298 78)">
    <circle cx="0" cy="0" r="14" fill="#304DBB"/>
    <text x="0" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">1</text>
  </g>
  <text x="298" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#0E1A33" text-anchor="middle">Identity</text>
  <text x="298" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#304DBB" text-anchor="middle">Complete</text>

  <line x1="314" y1="78" x2="388" y2="78" stroke="#304DBB" stroke-width="2"/>

  <!-- Step 2: Biometric (complete) -->
  <g transform="translate(404 78)">
    <circle cx="0" cy="0" r="14" fill="#304DBB"/>
    <text x="0" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">2</text>
  </g>
  <text x="404" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#0E1A33" text-anchor="middle">Biometric</text>
  <text x="404" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#304DBB" text-anchor="middle">Complete</text>

  <line x1="420" y1="78" x2="494" y2="78" stroke="#304DBB" stroke-width="2"/>

  <!-- Step 3: Documents (complete) -->
  <g transform="translate(510 78)">
    <circle cx="0" cy="0" r="14" fill="#304DBB"/>
    <text x="0" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">3</text>
  </g>
  <text x="510" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#0E1A33" text-anchor="middle">Documents</text>
  <text x="510" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#304DBB" text-anchor="middle">Complete</text>

  <!-- Connector 3-4: dashed (in progress) -->
  <line x1="526" y1="78" x2="600" y2="78" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Step 4: Approval (reviewing) -->
  <g transform="translate(616 78)">
    <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="#304DBB" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#304DBB" text-anchor="middle">4</text>
  </g>
  <text x="616" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#0E1A33" text-anchor="middle">Approval</text>
  <text x="616" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6B7280" text-anchor="middle">Reviewing</text>
</svg>
