<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 44" role="img" aria-label="PCI DSS Level 2 compliant">
  <!-- Solid white lozenge with the PCI wordmark knocked out (high-contrast,
       crisp at small size). -->
  <path d="M 14,3 L 60,3 L 52,41 L 6,41 Z" fill="#FFFFFF"/>
  <text x="30" y="30" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" font-style="italic" letter-spacing="0.3" text-anchor="middle" fill="#0B1633">PCI</text>
  <!-- DSS large + LEVEL 2 caption, generously sized so it stays legible. -->
  <text x="68" y="27" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="0.5" fill="#FFFFFF">DSS</text>
  <text x="116" y="27" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">LEVEL 2</text>
</svg>
