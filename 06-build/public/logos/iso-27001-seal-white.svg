<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ISO/IEC 27001 certified">
  <defs>
    <path id="iso27kw-top" d="M 15.5,46 A 34.5,34.5 0 0 1 84.5,46" fill="none"/>
    <path id="iso27kw-bot" d="M 20,59 A 30,30 0 0 0 80,59" fill="none"/>
  </defs>
  <!-- White version of the ISO 27001 seal (recoloured from the blue source for
       use on the navy footer). -->
  <circle cx="50" cy="50" r="48.2" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="40.8" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <g fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif">
    <text font-size="8.4" font-weight="700" letter-spacing="2.2" text-anchor="middle">
      <textPath href="#iso27kw-top" startOffset="50%">CERTIFIED</textPath>
    </text>
    <text font-size="6" font-weight="700" letter-spacing="0.4" text-anchor="middle">
      <textPath href="#iso27kw-bot" startOffset="50%">INFORMATION SECURITY</textPath>
    </text>
    <text x="50" y="42.5" font-size="8.6" font-weight="700" letter-spacing="0.6" text-anchor="middle">ISO/IEC</text>
    <text x="50" y="58" font-size="15.5" font-weight="800" letter-spacing="0.4" text-anchor="middle">27001</text>
    <text x="50" y="66.5" font-size="6.4" font-weight="600" letter-spacing="1.2" text-anchor="middle">:2022</text>
  </g>
  <g fill="#FFFFFF">
    <circle cx="11.4" cy="50" r="1.15"/>
    <circle cx="88.6" cy="50" r="1.15"/>
  </g>
</svg>
