<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ISO/IEC 27001:2022 certified">
  <defs>
    <path id="iso27k-top" d="M 15.5,46 A 34.5,34.5 0 0 1 84.5,46" fill="none"/>
    <path id="iso27k-bot" d="M 20,59 A 30,30 0 0 0 80,59" fill="none"/>
  </defs>
  <!-- Concentric seal rings -->
  <circle cx="50" cy="50" r="48.2" fill="none" stroke="#0054A8" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="40.8" fill="none" stroke="#0054A8" stroke-width="1"/>
  <g fill="#0054A8" font-family="Arial, Helvetica, sans-serif">
    <!-- Arc text -->
    <text font-size="8.4" font-weight="700" letter-spacing="2.2" text-anchor="middle">
      <textPath href="#iso27k-top" startOffset="50%">CERTIFIED</textPath>
    </text>
    <text font-size="6" font-weight="700" letter-spacing="0.4" text-anchor="middle">
      <textPath href="#iso27k-bot" startOffset="50%">INFORMATION SECURITY</textPath>
    </text>
    <!-- Centre lockup -->
    <text x="50" y="42.5" font-size="8.6" font-weight="700" letter-spacing="0.6" text-anchor="middle">ISO/IEC</text>
    <text x="50" y="58" font-size="15.5" font-weight="800" letter-spacing="0.4" text-anchor="middle">27001</text>
    <text x="50" y="66.5" font-size="6.4" font-weight="600" letter-spacing="1.2" text-anchor="middle">:2022</text>
  </g>
  <!-- Flanking ticks at 9 / 3 o'clock to break the inner ring like a seal -->
  <g fill="#0054A8">
    <circle cx="11.4" cy="50" r="1.15"/>
    <circle cx="88.6" cy="50" r="1.15"/>
  </g>
</svg>
